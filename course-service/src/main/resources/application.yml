# ============================================
# COURSE SERVICE - APPLICATION CONFIGURATION
# ============================================
# File: course-service/src/main/resources/application.yml
# ============================================

spring:
  application:
    name: course-service

  # ============================================
  # DATASOURCE CONFIGURATION
  # ============================================
  datasource:
    url: jdbc:postgresql://${COURSE_DB_HOST:localhost}:${COURSE_DB_PORT:5434}/${COURSE_DB_NAME:course_db}
    username: ${COURSE_DB_USERNAME:course_user}
    password: ${COURSE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      auto-commit: true

  # ============================================
  # JPA / HIBERNATE CONFIGURATION
  # ============================================
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        generate_statistics: false
    open-in-view: false

  # ============================================
  # KAFKA CONFIGURATION
  # ============================================
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    consumer:
      group-id: ${COURSE_KAFKA_CONSUMER_GROUP:course-service-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      enable-auto-commit: false
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.lethien.common_lib.event"
        spring.json.use.type.headers: true
        spring.json.type.mapping: >
          ACCOUNT_CREATED:com.lethien.common_lib.event.AccountCreatedEvent,
          EMAIL_CHANGE_CONFIRMED:com.lethien.common_lib.event.EmailChangeConfirmedEvent
          
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      batch-size: 16384
      linger-ms: 5
      buffer-memory: 33554432
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        request.timeout.ms: 30000
        spring.json.add.type.headers: true
        spring.json.type.mapping: >
          ACCOUNT_CREATED:com.lethien.common_lib.event.AccountCreatedEvent,
          EMAIL_CHANGE_CONFIRMED:com.lethien.common_lib.event.EmailChangeConfirmedEvent
          
# ============================================
# CUSTOM KAFKA PROPERTIES
# ============================================
kafka:
  consumer:
    concurrency: 3
  topic:
    partitions: 3
    replicas: 1

# ============================================
# FILE STORAGE CONFIGURATION
# ============================================
storage:
  # MinIO — dùng cho local dev
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket:
      video: ${MINIO_BUCKET_VIDEO:course-videos}
      audio: ${MINIO_BUCKET_AUDIO:course-audios}
      thumbnail: ${MINIO_BUCKET_THUMBNAIL:course-thumbnails}
      document: ${MINIO_BUCKET_DOCUMENT:course-documents}

  # Cloudflare R2 — dùng cho production (tương thích S3 API)
  cloudflare:
    account-id: ${CLOUDFLARE_ACCOUNT_ID:}
    access-key: ${CLOUDFLARE_ACCESS_KEY:}
    secret-key: ${CLOUDFLARE_SECRET_KEY:}
    bucket: ${CLOUDFLARE_BUCKET:course-content}
    endpoint: ${CLOUDFLARE_ENDPOINT:https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com}
    public-url: ${CLOUDFLARE_PUBLIC_URL:}  # Custom domain nếu có

  # Active provider — đổi sang "cloudflare" khi deploy production
  provider: ${STORAGE_PROVIDER:minio}

# ============================================
# SERVER CONFIGURATION
# ============================================
server:
  port: ${COURSE_SERVICE_PORT:8083}
  servlet:
    context-path: /api/courses
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.lethien.course_service: ${APP_LOG_LEVEL:DEBUG}
    org.springframework.web: ${WEB_LOG_LEVEL:DEBUG}
    org.springframework.security: ${SECURITY_LOG_LEVEL:DEBUG}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:DEBUG}
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/course-service.log}

# ============================================
# JWT CONFIGURATION
# ============================================
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:900000}

# ============================================
# ACTUATOR CONFIGURATION
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: ${HEALTH_SHOW_DETAILS:always}
  health:
    db:
      enabled: true

# ============================================
# SPRINGDOC / SWAGGER CONFIGURATION
# ============================================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true
  show-actuator: false

---
# ============================================
# DOCKER PROFILE
# ============================================
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://course-db:5432/course_db
    username: course_user
    password: course_password_dev_only

  kafka:
    bootstrap-servers: kafka:29092

storage:
  minio:
    endpoint: http://minio:9000
  provider: minio

server:
  port: 8083

logging:
  level:
    root: INFO
    com.lethien.course_service: INFO

---
# ============================================
# PRODUCTION PROFILE
# ============================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    show-sql: false
    properties:
      hibernate:
        generate_statistics: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

storage:
  provider: cloudflare

logging:
  level:
    root: WARN
    com.lethien.course_service: INFO
  file:
    name: /var/log/course-service/application.log