# ============================================
# USER SERVICE - APPLICATION CONFIGURATION
# ============================================
# File: user-service/src/main/resources/application.yml
# ============================================

spring:
  application:
    name: user-service

  # ============================================
  # DATASOURCE CONFIGURATION
  # ============================================
  datasource:
    url: jdbc:postgresql://${USER_DB_HOST:localhost}:${USER_DB_PORT:5433}/${USER_DB_NAME:user_db}
    username: ${USER_DB_USERNAME:user_user}
    password: ${USER_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    # HikariCP Connection Pool
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      auto-commit: true

  # ============================================
  # JPA / HIBERNATE CONFIGURATION
  # ============================================
  jpa:
    # IMPORTANT: validate only - schema already created by SQL scripts
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:validate}

    # Show SQL queries in console
    show-sql: ${SHOW_SQL:true}

    properties:
      hibernate:
        # PostgreSQL dialect
        dialect: org.hibernate.dialect.PostgreSQLDialect

        # Format SQL for readability
        format_sql: true

        # Use new ID generator
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

        # Enable query statistics (dev only)
        generate_statistics: false

    # Open EntityManager in View
    open-in-view: false

  # ============================================
  # KAFKA CONFIGURATION
  # ============================================
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:user-service-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      enable-auto-commit: false
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.lethien.common_lib.event"
        spring.json.use.type.headers: false
        spring.json.value.default.type: "com.lethien.common_lib.event.AccountCreatedEvent"
#        spring.json.type.mapping: "ACCOUNT_CREATED:com.lethien.common_lib.event.AccountCreatedEvent"
#          ACCOUNT_UPDATED:com.lethien.common_lib.event.AccountUpdatedEvent,
#          ACCOUNT_DELETED:com.lethien.common_lib.event.AccountDeletedEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

# Custom properties
kafka:
  consumer:
    concurrency: 3    # match số partition
  topic:
    partitions: 3
    replicas: 1

# ============================================
# SERVER CONFIGURATION
# ============================================
server:
  port: ${USER_SERVICE_PORT:8082}
  servlet:
    context-path: /api/users
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.lethien.user_service: ${APP_LOG_LEVEL:DEBUG}
#    com.education.user: DEBUG
    org.springframework.web: ${WEB_LOG_LEVEL:DEBUG}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:DEBUG}
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/user-service.log}

# ============================================
# ACTUATOR CONFIGURATION (Health checks)
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: ${HEALTH_SHOW_DETAILS:always}
  health:
    db:
      enabled: true

# ============================================
# SPRINGDOC / SWAGGER CONFIGURATION
# ============================================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  api-docs:
    path: /v3/api-docs
  show-actuator: false

---
# ============================================
# DOCKER PROFILE
# ============================================
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://user-db:5432/user_db
    username: user_user
    password: user_password_dev_only

  kafka:
    bootstrap-servers: kafka:29092

server:
  port: 8082

logging:
  level:
    root: INFO
    com.lethien.user_service: INFO
#    com.education.user: INFO

---
# ============================================
# PRODUCTION PROFILE
# ============================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    show-sql: false
    properties:
      hibernate:
        generate_statistics: false

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

logging:
  level:
    root: WARN
    com.education.user: INFO
  file:
    name: /var/log/user-service/application.log