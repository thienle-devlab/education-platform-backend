server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: api-gateway

  # ============================================
  # GATEWAY CONFIGURATION
  # ============================================
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - ${FRONTEND_URL:http://localhost:3000}
              - ${ALLOWED_ORIGIN_1:http://localhost:4200}
              - ${ALLOWED_ORIGIN_2:http://localhost:8080}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - Authorization
              - Content-Type
            allowCredentials: true
            maxAge: 3600

      routes:
        - id: auth-service-swagger
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/v3/api-docs
#          filters:
#            - RewritePath=/api/auth/v3/api-docs, /v3/api-docs

        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
#          filters:
#            - RewritePath=/api/auth/(?<segment>.*), /$\{segment}

        - id: user-service-swagger
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/users/v3/api-docs
#          filters:
#            - RewritePath=/api/users/v3/api-docs, /v3/api-docs

        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/users/**
#          filters:
#            - RewritePath=/api/users/(?<segment>.*), /api/user/$\{segment}

# ============================================
# SPRINGDOC / SWAGGER CONFIGURATION
# ============================================
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: 1. Authentication Service
        url: /api/auth/v3/api-docs
      - name: 2. User Service
        url: /api/users/v3/api-docs
    urls-primary-name: 1. Authentication Service
    display-operation-id: false
    display-request-duration: true
  api-docs:
    enabled: true
    path: /v3/api-docs

# ============================================
# ACTUATOR CONFIGURATION (Health checks)
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: ${HEALTH_SHOW_DETAILS:always}
    gateway:
      access: unrestricted

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging:
  level:
    root: ${LOG_LEVEL:INFO}
    org.springframework.cloud.gateway: ${GATEWAY_LOG_LEVEL:DEBUG}
    reactor.netty: ${NETTY_LOG_LEVEL:INFO}
    org.springframework.web: ${WEB_LOG_LEVEL:DEBUG}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/gateway.log}

---
# ============================================
# DOCKER PROFILE
# ============================================
spring:
  config:
    activate:
      on-profile: docker

  cloud:
    gateway:
      routes:
        - id: auth-service-swagger
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/v3/api-docs

        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**

        - id: user-service-swagger
          uri: http://user-service:8082
          predicates:
            - Path=/api/users/v3/api-docs

        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/api/users/**

server:
  port: 8080

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: INFO

---
# ============================================
# PRODUCTION PROFILE
# ============================================
spring:
  config:
    activate:
      on-profile: prod

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - ${FRONTEND_URL}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - Authorization
              - Content-Type
            allowCredentials: true
            maxAge: 3600

      routes:
        - id: auth-service-swagger
          uri: ${AUTH_SERVICE_URL}
          predicates:
            - Path=/api/auth/v3/api-docs

        - id: auth-service
          uri: ${AUTH_SERVICE_URL}
          predicates:
            - Path=/api/auth/**

        - id: user-service-swagger
          uri: ${USER_SERVICE_URL}
          predicates:
            - Path=/api/users/v3/api-docs

        - id: user-service
          uri: ${USER_SERVICE_URL}
          predicates:
            - Path=/api/users/**

logging:
  level:
    root: WARN
    org.springframework.cloud.gateway: INFO
  file:
    name: /var/log/gateway/application.log